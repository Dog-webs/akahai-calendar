        }
    });

    // 今週のイベントを抽出して表示する関数
    function renderWeekEvents() {
        const events = calendar.getEvents();
        const today = new Date();
        today.setHours(0,0,0,0);
        // 月曜日〜日曜日の範囲を算出
        const dayIndex = today.getDay();
        const monday = new Date(today);
        monday.setDate(today.getDate() - ((dayIndex + 6) % 7));
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);

        // この範囲にあるイベントを抽出
        const weekEvents = events.filter(evt => {
            const d = new Date(evt.start);
            d.setHours(0,0,0,0);
            return d >= monday && d <= sunday;
        }).sort((a,b) => a.start - b.start);

        // カードの挿入先
        const container = document.getElementById('week-events');
        if (!container) return;
        container.innerHTML = '';
        const weekdays = ['日','月','火','水','木','金','土'];

        weekEvents.forEach(evt => {
            const d = new Date(evt.start);
            const card = document.createElement('div');
            card.className = 'event-card';
            card.innerHTML = `
                <div class="event-date">${weekdays[d.getDay()]} <span>${d.getDate()}</span></div>
                <div class="event-title">${evt.title}</div>
                <div class="event-description">${evt.extendedProps?.description || ''}</div>
            `;
            container.appendChild(card);
        });
    }

    // カレンダー描画 & 初回の今週イベント描画
    calendar.render();
    renderWeekEvents();

    // モーダルクローズ処理
    var modalEl = document.getElementById('event-modal');
    var closeBtn = modalEl.querySelector('.event-modal-close');
    closeBtn.addEventListener('click', function() {
        modalEl.classList.remove('active');
    });
    modalEl.addEventListener('click', function(e) {
        if (e.target === modalEl) {
            modalEl.classList.remove('active');
        }
    });
});

// ▼ 冬季限定で雪を降らせる
const now = new Date();
const winterMonths = [12, 1, 2]; // 12月〜2月を冬と定義
if (winterMonths.includes(now.getMonth() + 1)) {
  createSnow();
}

function createSnow() {
  const container = document.createElement('div');
  container.className = 'snow-container';
  document.body.appendChild(container);

  const flakeCount = 80; // 雪の粒の数を調整できます
  for (let i = 0; i < flakeCount; i++) {
    const flake = document.createElement('div');
    flake.className = 'snowflake';
    flake.style.left = Math.random() * 100 + 'vw';
    flake.style.animationDuration = (5 + Math.random() * 5) + 's';
    flake.style.animationDelay = Math.random() * 5 + 's';
    flake.style.opacity = Math.random();
    flake.style.width = flake.style.height = (4 + Math.random() * 6) + 'px';
    container.appendChild(flake);
  }
}

// ▼ 天気ウィジェット（町田市）＋背景エフェクト
const API_KEY = "c8c4026c5327b6bc22bfe70dfe175303";
const CITY_NAME = "Machida,jp";

fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY_NAME}&appid=${API_KEY}&units=metric&lang=ja`)
  .then(response => response.json())
  .then(data => {
    const weather = data.weather[0].main.toLowerCase(); // 天気コード（例：clear, rain, clouds）
    const weatherDesc = data.weather[0].description;
    const temp = Math.round(data.main.temp);
    const icon = data.weather[0].icon;
    const iconUrl = `https://openweathermap.org/img/wn/${icon}.png`;

    // ウィジェット描画
    const widget = document.getElementById("weather-widget");
    widget.innerHTML = `
      <img src="${iconUrl}" alt="${weatherDesc}">
      <span>今日の町田：${weatherDesc} ${temp}℃</span>
    `;

    // 背景エフェクト切替
    if (weather.includes("clear")) {
      createSunlightEffect();
    } else if (weather.includes("rain")) {
      createRainEffect();
    }
  })
  .catch(() => {
    document.getElementById("weather-widget").textContent = "天気情報を取得できませんでした。";
  });

// ☀️ 晴れエフェクト
function createSunlightEffect() {
  const sun = document.createElement('div');
  sun.className = 'sunny-effect';
  document.body.appendChild(sun);
}

// 🌧️ 雨エフェクト
function createRainEffect() {
  const container = document.createElement('div');
  container.className = 'rain-container';
  document.body.appendChild(container);

  for (let i = 0; i < 60; i++) {
    const drop = document.createElement('div');
    drop.className = 'raindrop';
    drop.style.left = Math.random() * 100 + 'vw';
    drop.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
    drop.style.animationDelay = Math.random() * 2 + 's';
    container.appendChild(drop);
  }
}
